<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오사카 여행 · 다정과 성원</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --washi:#FAF6EE;
  --washi-dark:#F3EDDF;
  --sumi:#1A1816;
  --sumi-soft:#2E2A26;
  --gray:#6E6862;
  --gray-light:#B5AFA3;
  --hairline:#D9D2C1;
  --hairline-soft:#E8E2D1;
  --vermillion:#A52834;
  --vermillion-deep:#7A1C24;
  --indigo:#2C3E5C;
}
html,body{background:var(--washi);color:var(--sumi);font-family:'Noto Serif KR',serif;font-weight:400;line-height:1.75;-webkit-font-smoothing:antialiased;font-size:16px}
body{overflow-x:hidden;padding-bottom:88px}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 20% 10%,rgba(139,128,108,.04) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 70%,rgba(165,40,52,.025) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 90%,rgba(139,128,108,.03) 0%,transparent 60%);
}
body>*{position:relative;z-index:1}

/* ━━━ HERO ━━━ */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:4rem 2rem;position:relative;text-align:center}
.hero-mark{position:absolute;top:3rem;left:50%;transform:translateX(-50%);font-size:.78rem;letter-spacing:.5em;color:var(--vermillion);font-weight:500}
.hero-mark::before,.hero-mark::after{content:'';display:inline-block;width:24px;height:1px;background:var(--vermillion);vertical-align:middle;margin:0 14px}

.hero-title{font-family:'Noto Serif KR',serif;font-size:clamp(3rem,9vw,5.2rem);font-weight:600;color:var(--sumi);letter-spacing:-.02em;line-height:1.15;margin-bottom:1rem;animation:inkFade 1.2s ease both}
.hero-title .accent{color:var(--vermillion)}

.hero-sub{font-size:1rem;color:var(--gray);font-weight:400;letter-spacing:.2em;margin-top:1rem;animation:inkFade 1.2s ease both;animation-delay:.2s}

.hero-divider{width:1px;height:50px;background:var(--hairline);margin:2.5rem auto;animation:inkFade 1.2s ease both;animation-delay:.4s}

.hero-names{font-size:1.25rem;color:var(--sumi);font-weight:500;letter-spacing:.1em;margin-bottom:.6rem;animation:inkFade 1.2s ease both;animation-delay:.5s}
.hero-names .amp{color:var(--vermillion);margin:0 .7rem;font-weight:400}

.hero-date{font-size:.95rem;color:var(--gray);letter-spacing:.15em;font-weight:400;animation:inkFade 1.2s ease both;animation-delay:.6s}

.hero-dday{margin-top:3rem;animation:inkFade 1.2s ease both;animation-delay:.8s;cursor:pointer}
.hero-dday:hover .dday-num{color:var(--vermillion)}
.dday-label-small{font-size:.78rem;color:var(--gray);letter-spacing:.3em;margin-bottom:.6rem;font-weight:500}
.dday-num{font-size:3rem;font-weight:600;color:var(--sumi);letter-spacing:.02em;line-height:1;transition:color .3s}
.dday-caption{font-size:.8rem;color:var(--gray);letter-spacing:.05em;margin-top:.6rem}

.hero-scroll{position:absolute;bottom:3rem;left:50%;transform:translateX(-50%);font-size:.72rem;color:var(--gray);letter-spacing:.3em;animation:bob 2.5s ease-in-out infinite;font-weight:500}

/* ━━━ INTRO ━━━ */
.intro{max-width:600px;margin:0 auto;padding:5rem 2rem;text-align:center;position:relative}
.intro::before{content:'';display:block;width:40px;height:1px;background:var(--vermillion);margin:0 auto 2.5rem}
.intro-text{font-size:1.1rem;line-height:2;color:var(--sumi-soft);font-weight:400;letter-spacing:.02em}
.intro-author{display:block;margin-top:1.8rem;font-size:.8rem;color:var(--gray);letter-spacing:.15em}
.intro::after{content:'';display:block;width:40px;height:1px;background:var(--vermillion);margin:2.5rem auto 0}

/* ━━━ CONTENT ━━━ */
.content{max-width:720px;margin:0 auto;padding:3rem 1.8rem 4rem}

.day{margin-bottom:6rem;position:relative}
.day-head{display:flex;align-items:baseline;gap:1.8rem;margin-bottom:2.5rem;padding-bottom:1.4rem;border-bottom:1px solid var(--hairline)}
.day-num-big{font-size:3.5rem;font-weight:600;color:var(--vermillion);line-height:1;letter-spacing:-.03em;flex-shrink:0;font-family:'Noto Serif KR',serif}
.day-num-big .small{font-size:.5em;color:var(--gray);margin-left:.1em;font-weight:500}
.day-text{flex:1;min-width:0}
.day-date{font-size:.85rem;color:var(--gray);letter-spacing:.08em;margin-bottom:.5rem;font-weight:500}
.day-title{font-size:1.4rem;font-weight:600;color:var(--sumi);line-height:1.4;letter-spacing:-.01em;margin-bottom:.4rem}
.day-subtitle{font-size:.92rem;color:var(--gray);font-weight:400;line-height:1.65}

/* Schedule rows */
.item{display:flex;gap:1.5rem;padding:1.6rem 0;border-bottom:1px solid var(--hairline-soft);position:relative;transition:background .15s}
.item:hover{background:rgba(165,40,52,.015)}
.item:last-child{border-bottom:none}
.item.hl::before{content:'';position:absolute;left:-1.4rem;top:1.9rem;width:7px;height:7px;border-radius:50%;background:var(--vermillion)}
@media(max-width:600px){.item.hl::before{left:-.9rem}}

.item-time{font-size:.95rem;color:var(--vermillion);font-weight:600;letter-spacing:.02em;flex-shrink:0;padding-top:.15rem;min-width:56px;font-variant-numeric:tabular-nums}
.item-body{flex:1;min-width:0}
.item-head{display:flex;align-items:baseline;gap:.7rem;margin-bottom:.5rem;flex-wrap:wrap}
.item-title{font-size:1.1rem;font-weight:600;color:var(--sumi);line-height:1.5;letter-spacing:-.005em}
.item-note{font-size:.92rem;color:var(--gray);line-height:1.75;font-weight:400}

/* Tag */
.tag{display:inline-block;font-size:.68rem;padding:3px 10px;border:1px solid currentColor;letter-spacing:.05em;font-weight:600;line-height:1.5;border-radius:2px}
.tag-food{color:#8B4513}
.tag-view{color:var(--indigo)}
.tag-shop{color:#6B3E87}
.tag-drink{color:var(--vermillion)}

/* Map link */
.map-link{font-size:.75rem;color:var(--gray);text-decoration:none;border-bottom:1px solid var(--gray-light);padding-bottom:1px;transition:all .2s;cursor:pointer;display:inline-block;margin-left:.5rem;white-space:nowrap;font-weight:500}
.map-link:hover{color:var(--vermillion);border-color:var(--vermillion)}
.map-link::before{content:'⌖ ';font-size:.95em}

/* Transport */
.transport{margin-top:1rem;padding:1rem 1.2rem;background:var(--washi-dark);border-left:3px solid var(--indigo)}
.transport-label{font-size:.7rem;color:var(--indigo);letter-spacing:.2em;font-weight:700;margin-bottom:.5rem}
.transport-line{font-size:.95rem;color:var(--sumi);font-weight:600;margin-bottom:.3rem;letter-spacing:-.005em}
.transport-route{font-size:.88rem;color:var(--gray);line-height:1.65;margin-bottom:.5rem}
.transport-route strong{color:var(--vermillion);font-weight:600}
.transport-meta{display:flex;gap:1.4rem;font-size:.82rem;color:var(--sumi-soft);font-variant-numeric:tabular-nums;padding-top:.5rem;border-top:1px dashed var(--hairline);font-weight:500}
.transport-meta span{white-space:nowrap;display:inline-flex;align-items:center;gap:.35rem}
.transport-meta .lbl{color:var(--indigo);font-size:.7rem;letter-spacing:.1em;font-weight:600}
.transport-tip{font-size:.82rem;color:var(--gray);margin-top:.6rem;padding-top:.6rem;border-top:1px dashed var(--hairline);line-height:1.7}
.transport-tip::before{content:'💡 ';font-size:.85em}

/* Nearby panel */
.btn-nearby{margin-top:1.1rem;background:none;border:none;font-size:.82rem;color:var(--vermillion);letter-spacing:.05em;cursor:pointer;padding:.4rem 0;border-bottom:1px solid var(--vermillion);transition:all .2s;font-weight:600;font-family:inherit}
.btn-nearby::before{content:'▸ '}
.btn-nearby.open::before{content:'▾ '}
.btn-nearby:hover{color:var(--vermillion-deep)}

.nearby-panel{max-height:0;overflow:hidden;opacity:0;transition:all .4s ease}
.nearby-panel.open{max-height:3000px;opacity:1;margin-top:1.1rem;padding:1.3rem 0;border-top:1px solid var(--hairline);border-bottom:1px solid var(--hairline)}
.nearby-label{font-size:.75rem;color:var(--vermillion);letter-spacing:.2em;font-weight:700;margin-bottom:1rem}
.nearby-label::before{content:'◇ '}
.nearby-item{padding:.9rem 0;border-bottom:1px dashed var(--hairline-soft)}
.nearby-item:last-child{border-bottom:none}
.nearby-name{font-size:.98rem;font-weight:600;color:var(--sumi);margin-bottom:.35rem;display:flex;align-items:baseline;gap:.4rem;flex-wrap:wrap;line-height:1.5}
.nearby-note{font-size:.85rem;color:var(--gray);line-height:1.7}

/* ━━━ FOOTER ━━━ */
.footer{background:var(--sumi);color:var(--washi);padding:5rem 2rem;text-align:center}
.footer-heart{font-size:2.5rem;margin-bottom:1.2rem}
.footer-line{width:30px;height:1px;background:var(--gray);margin:1.2rem auto}
.footer-msg{font-size:1.05rem;color:var(--washi);letter-spacing:.15em;opacity:.9;font-weight:500}
.footer-sub{font-size:.78rem;color:var(--gray);letter-spacing:.2em;margin-top:.9rem;opacity:.7}

/* ━━━ NAV ━━━ */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(250,246,238,.94);backdrop-filter:blur(12px);border-top:1px solid var(--hairline);padding:.8rem 1rem;display:flex;justify-content:center;gap:.4rem}
.nav-btn{background:none;border:none;font-family:inherit;font-size:.88rem;color:var(--sumi);padding:.7rem 1.2rem;letter-spacing:.02em;cursor:pointer;transition:all .2s;font-weight:600;position:relative;white-space:nowrap;border-radius:4px}
.nav-btn:hover{color:var(--vermillion);background:rgba(165,40,52,.04)}
.nav-btn.active{color:var(--vermillion)}
.nav-btn.active::after{content:'';position:absolute;bottom:.2rem;left:50%;transform:translateX(-50%);width:18px;height:2px;background:var(--vermillion)}

@media(max-width:500px){
  .nav{padding:.6rem .3rem;gap:.1rem}
  .nav-btn{padding:.6rem .7rem;font-size:.82rem}
}

/* ━━━ MODAL ━━━ */
.modal-overlay{position:fixed;inset:0;background:rgba(26,24,22,.6);backdrop-filter:blur(3px);z-index:200;display:none;align-items:flex-end;justify-content:center;animation:fadeIn .3s ease;padding:0}
.modal-overlay.show{display:flex}
.modal{background:var(--washi);width:100%;max-width:560px;max-height:85vh;overflow-y:auto;animation:slideUp .35s ease;border-top:3px solid var(--vermillion);padding-bottom:2rem}
@media(min-width:600px){.modal-overlay{align-items:center;padding:1.5rem}.modal{max-height:82vh;border:1px solid var(--hairline);border-top:3px solid var(--vermillion)}}
.modal-head{position:sticky;top:0;background:var(--washi);padding:1.8rem 2rem 1.1rem;border-bottom:1px solid var(--hairline);z-index:2;display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:1.15rem;font-weight:600;color:var(--sumi);letter-spacing:.02em}
.modal-title::before{content:'◇ ';color:var(--vermillion)}
.modal-close{background:none;border:none;font-size:1.5rem;color:var(--gray);cursor:pointer;line-height:1;padding:0 .3rem}
.modal-close:hover{color:var(--vermillion)}
.modal-body{padding:1.5rem 2rem}

.phrase{padding:1.3rem 0;border-bottom:1px solid var(--hairline-soft)}
.phrase:last-child{border:none}
.phrase-ko{font-size:.88rem;color:var(--gray);margin-bottom:.4rem;font-weight:500}
.phrase-jp{font-size:1.2rem;color:var(--sumi);font-weight:600;margin-bottom:.3rem;letter-spacing:.01em}
.phrase-romaji{font-size:.85rem;color:var(--vermillion);letter-spacing:.05em;font-weight:500}

.pack-cat{font-size:.88rem;color:var(--vermillion);letter-spacing:.1em;margin:2rem 0 .8rem;padding-bottom:.6rem;border-bottom:1px solid var(--hairline);font-weight:700}
.pack-cat:first-child{margin-top:0}
.pack-item{display:flex;align-items:center;gap:1rem;padding:.95rem 0;cursor:pointer;border-bottom:1px dashed var(--hairline-soft)}
.pack-item:last-child{border-bottom:none}
.pack-check{width:20px;height:20px;border:1.5px solid var(--gray);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--washi);border-radius:2px}
.pack-item.done .pack-check{background:var(--vermillion);border-color:var(--vermillion)}
.pack-item.done .pack-check::after{content:'✓';color:var(--washi);font-size:.8rem;font-weight:700}
.pack-label{font-size:.95rem;color:var(--sumi);flex:1;font-weight:500}
.pack-item.done .pack-label{color:var(--gray);text-decoration:line-through}
.pack-progress{font-size:.9rem;color:var(--vermillion);text-align:center;padding:1.1rem;border:1px solid var(--hairline);letter-spacing:.03em;margin-bottom:1.5rem;background:var(--washi-dark);font-weight:600}

.pass-card{padding:1.4rem 0;border-bottom:1px solid var(--hairline)}
.pass-card:last-child{border-bottom:none}
.pass-name{font-size:1.1rem;font-weight:700;color:var(--sumi);margin-bottom:.45rem}
.pass-price{font-size:.85rem;color:var(--vermillion);letter-spacing:.03em;margin-bottom:.8rem;display:block;font-weight:600}
.pass-desc{font-size:.9rem;color:var(--gray);line-height:1.75;margin-bottom:.8rem;font-weight:400}
.pass-use{font-size:.88rem;color:var(--indigo);background:var(--washi-dark);padding:.8rem 1rem;border-left:3px solid var(--indigo);line-height:1.7;font-weight:500}

/* Editing */
.editing .item{border:1px dashed transparent}
.editing .item:hover{border-color:var(--vermillion)}
.editing .editable{cursor:text;border-bottom:1px dashed var(--gray-light);outline:none;min-width:30px;display:inline-block}
.editing .editable:focus{border-bottom-color:var(--vermillion);background:rgba(165,40,52,.04)}
.btn-add{display:none;width:100%;padding:.9rem;margin-top:1rem;border:1px dashed var(--gray-light);background:none;color:var(--gray);font-family:inherit;font-size:.85rem;cursor:pointer;transition:all .2s;font-weight:500}
.btn-add:hover{border-color:var(--vermillion);color:var(--vermillion)}
.editing .btn-add{display:block}
.btn-del{display:none;position:absolute;top:1rem;right:0;background:none;border:1px solid rgba(220,53,69,.3);color:#dc3545;width:24px;height:24px;font-size:.8rem;cursor:pointer;border-radius:2px}
.editing .btn-del{display:flex;align-items:center;justify-content:center}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--sumi);color:var(--washi);padding:.95rem 1.8rem;font-size:.88rem;letter-spacing:.02em;opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap;border-left:3px solid var(--vermillion);font-weight:500}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes inkFade{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

@media(max-width:600px){
  html,body{font-size:15.5px}
  .content{padding:2rem 1.2rem 3rem}
  .day-head{gap:1.2rem}
  .day-num-big{font-size:2.8rem}
  .day-title{font-size:1.2rem}
  .item{gap:1rem;padding:1.3rem 0}
  .item-time{min-width:48px;font-size:.9rem}
  .item-title{font-size:1.02rem}
  .item-note{font-size:.88rem}
  .modal-body,.modal-head{padding-left:1.5rem;padding-right:1.5rem}
}
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-mark">OSAKA · KYOTO</div>
  <h1 class="hero-title">오사카<br><span class="accent">여행</span></h1>
  <div class="hero-sub">3박 4일 · 봄날의 간사이</div>

  <div class="hero-divider"></div>

  <div class="hero-names">다정 <span class="amp">&</span> 성원</div>
  <div class="hero-date">2026. 04. 09 ─ 04. 12</div>

  <div class="hero-dday" onclick="setTripDate()">
    <div class="dday-label-small">출발까지</div>
    <div class="dday-num" id="dday">D-??</div>
    <div class="dday-caption" id="ddayLabel">탭해서 출발일 설정</div>
  </div>

  <div class="hero-scroll">SCROLL</div>
</section>

<!-- INTRO -->
<section class="intro">
  <div class="intro-text">
    벚꽃 흩날리는 봄,<br>
    도톤보리 불빛 아래<br>
    우리 둘의 발자국을 남기자.
    <span class="intro-author">─ 2026년 봄, 3박 4일</span>
  </div>
</section>

<!-- CONTENT -->
<main class="content" id="itinerary"></main>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-heart">🏮</div>
  <div class="footer-line"></div>
  <div class="footer-msg">오사카의 밤</div>
  <div class="footer-sub">for 다정 · by 성원</div>
</footer>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn" onclick="openModal('pass')">교통패스</button>
  <button class="nav-btn" onclick="openModal('pack')">준비물</button>
  <button class="nav-btn" onclick="openModal('jp')">회화</button>
  <button class="nav-btn" id="navEdit" onclick="toggleEdit()">편집</button>
  <button class="nav-btn" id="navShare" onclick="shareItinerary()" style="display:none">공유</button>
</nav>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const DAY_DATES = ['4월 9일 · 목요일','4월 10일 · 금요일','4월 11일 · 토요일','4월 12일 · 일요일'];

const DEFAULT_DATA = [

      {time:"12:50",place:"난카이 난바 → 메트로 난바역",note:"지하도 이정표 따라 도보 5분",tag:"",addr:""},
      {time:"13:00",place:"혼마치 호텔로 이동",note:"2정거장이라 금방",tag:"",addr:"",
        transport:{line:"오사카 메트로 미도스지선 (빨간색 M)",route:"<strong>난바</strong> → 신사이바시 → <strong>혼마치</strong>",time:"약 4분 · 2정거장",fare:"190엔",tip:"혼마치는 미도스지선·츄오선·요츠바시선 3개 노선 교차. 호텔 위치 최고"}
      },

let data = [];
let editMode = false;

function loadData() {
  const urlData = getUrlData();
  if (urlData) { data = urlData; saveLocal(); }
  else {
    const local = localStorage.getItem('osaka_trip_v3');
    data = local ? JSON.parse(local) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
}
function saveLocal() { localStorage.setItem('osaka_trip_v3', JSON.stringify(data)); }
function getUrlData() {
  try {
    const hash = location.hash.slice(1);
    if (!hash) return null;
    const parsed = JSON.parse(decodeURIComponent(atob(hash)));
    if (Array.isArray(parsed) && parsed.length > 0) {
      history.replaceState(null, '', location.pathname);
      return parsed;
    }
  } catch(e) {}
  return null;
}
function makeUrl() { return location.origin + location.pathname + '#' + btoa(encodeURIComponent(JSON.stringify(data))); }

          <div class="transport-line">${esc(t.line)}</div>
          <div class="transport-route">${t.route}</div>
          <div class="transport-meta">
            <span><span class="lbl">소요</span>${esc(t.time)}</span>
            <span><span class="lbl">요금</span>${esc(t.fare)}</span>
          </div>
          ${t.tip?`<div class="transport-tip">${esc(t.tip)}</div>`:''}
        </div>`;
      }

      let mapBtn = '';
      if (item.addr) {
        const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.addr)}`;
        mapBtn = `<a class="map-link" href="${url}" target="_blank" rel="noopener">지도</a>`;
      }

      let nearbyHtml = '';
      if (item.nearby && NEARBY[item.nearby]) {
        const nb = NEARBY[item.nearby];
        const panelId = `nb-${di}-${ii}`;
        let panelInner = '';
        if (nb.food && nb.food.length) {
          panelInner += `<div class="nearby-label">추천 가게</div>`;
          nb.food.forEach(f => {
            const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(f.addr)}`;
            panelInner += `<div class="nearby-item"><div class="nearby-name">${esc(f.name)}<a class="map-link" href="${url}" target="_blank" rel="noopener">지도</a></div><div class="nearby-note">${esc(f.note)}</div></div>`;
          });
        }
        nearbyHtml = `<button class="btn-nearby" onclick="toggleNearby('${panelId}', this)">추천 가게 보기</button><div class="nearby-panel" id="${panelId}">${panelInner}</div>`;
      }

      el.innerHTML = `
        <button class="btn-del" onclick="delItem(${di},${ii})">×</button>
        <div class="item-time ${editMode?'editable':''}" ${editMode?'contenteditable="true"':''} data-field="time" data-di="${di}" data-ii="${ii}">${esc(item.time)}</div>
        <div class="item-body">
          <div class="item-head">
            <div class="item-title"><span class="${editMode?'editable':''}" ${editMode?'contenteditable="true"':''} data-field="place" data-di="${di}" data-ii="${ii}">${esc(item.place)}</span>${mapBtn}</div>
            ${tagHtml}
          </div>
          <div class="item-note ${editMode?'editable':''}" ${editMode?'contenteditable="true"':''} data-field="note" data-di="${di}" data-ii="${ii}">${esc(item.note)}</div>
          ${transportHtml}
          ${nearbyHtml}
        </div>
      `;
      sched.appendChild(el);
    });
  });

  if (!editMode) initScrollAnim();
  document.querySelectorAll('.editable').forEach(el => {
    el.addEventListener('blur', onEdit);
    el.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();el.blur()} });
  });
}

function esc(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

function toggleNearby(panelId, btn) {
  const panel = document.getElementById(panelId);
  if (!panel) return;
  const isOpen = panel.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  btn.textContent = isOpen ? '접기' : '추천 가게 보기';
}

function onEdit(e) {
  const el = e.target;
  const di = parseInt(el.dataset.di);
  const ii = el.dataset.ii !== undefined ? parseInt(el.dataset.ii) : null;
  const field = el.dataset.field;
  const val = el.textContent.trim();
  if (ii !== null) data[di].items[ii][field] = val;
  else data[di][field] = val;
  saveLocal();
}

function addItem(di) {
  data[di].items.push({time:"00:00",place:"새 일정",note:"메모",tag:"",hl:false,addr:""});
  saveLocal(); render();
}
function delItem(di, ii) {
  if (data[di].items.length <= 1) { showToast('최소 1개 항목 필요'); return; }
  data[di].items.splice(ii, 1);
  saveLocal(); render();
}

function toggleEdit() {
  editMode = !editMode;
  document.body.classList.toggle('editing', editMode);
  document.getElementById('navEdit').classList.toggle('active', editMode);
  document.getElementById('navShare').style.display = editMode ? 'block' : 'none';
  render();
  showToast(editMode ? '편집 모드 ON · 탭해서 수정' : '편집 모드 OFF · 저장 완료');
}

function shareItinerary() {
  const url = makeUrl();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('링크 복사 완료 💌'));
  } else {
    const ta = document.createElement('textarea'); ta.value = url;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('링크 복사 완료 💌');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function renderDday() {
  let date = localStorage.getItem('osaka_date_v3');
  if (!date) { date = '2026-04-09'; localStorage.setItem('osaka_date_v3', date); }
  const ddayEl = document.getElementById('dday');
  const labelEl = document.getElementById('ddayLabel');
  const target = new Date(date + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.floor((target - today) / (1000*60*60*24));
  if (diff > 0) { ddayEl.textContent = `D − ${diff}`; labelEl.textContent = `${date} · 출발까지`; }
  else if (diff === 0) { ddayEl.textContent = '당일!'; labelEl.textContent = '오늘 출발 ✈️'; }
  else if (diff >= -3) { ddayEl.textContent = `여행 ${-diff+1}일차`; labelEl.textContent = '오사카에서 🏮'; }
  else { ddayEl.textContent = `다녀온 지 ${-diff-3}일`; labelEl.textContent = '추억이 되었네 🌸'; }
}

function setTripDate() {
  const current = localStorage.getItem('osaka_date_v3') || '';
  const input = prompt('출발일 (YYYY-MM-DD)', current || '2026-04-09');
  if (input && /^\d{4}-\d{2}-\d{2}$/.test(input)) {
    localStorage.setItem('osaka_date_v3', input);
    renderDday();
    showToast('저장 완료');
  }
}

function openModal(type) {
  const overlay = document.getElementById('modalOverlay');
  const title = document.getElementById('modalTitle');
  const body = document.getElementById('modalBody');

  if (type === 'jp') {
    title.textContent = '일본어 회화';
    body.innerHTML = PHRASES.map(p => `
      <div class="phrase">
        <div class="phrase-ko">${esc(p.ko)}</div>
        <div class="phrase-jp">${esc(p.jp)}</div>
        <div class="phrase-romaji">${esc(p.ro)}</div>
      </div>`).join('');
  } else if (type === 'pack') {
    title.textContent = '출국 준비물';
    const checked = JSON.parse(localStorage.getItem('osaka_pack_v3') || '{}');
    let total = 0, done = 0;
    let html = '<div class="pack-progress" id="packProg"></div>';
    Object.entries(PACKING).forEach(([cat, items]) => {
      html += `<div class="pack-cat">${esc(cat)}</div>`;
      items.forEach(item => {
        total++;
        const isDone = checked[item];
        if (isDone) done++;
        html += `<div class="pack-item ${isDone?'done':''}" onclick="togglePack('${esc(item).replace(/'/g,"\\'")}')">
          <div class="pack-check"></div>
          <div class="pack-label">${esc(item)}</div>
        </div>`;
      });
    });
    body.innerHTML = html;
    document.getElementById('packProg').textContent = `${done} / ${total} 준비 완료 · ${Math.round(done/total*100)}%`;
  } else if (type === 'pass') {
    title.textContent = '교통패스 안내';
    body.innerHTML = PASSES.map(p => `
      <div class="pass-card">
        <div class="pass-name">${esc(p.name)}</div>
        <div class="pass-price">${esc(p.price)}</div>
        <div class="pass-desc">${esc(p.desc)}</div>
        <div class="pass-use">${esc(p.use)}</div>
      </div>`).join('');
  }

  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); document.body.style.overflow = ''; }
function closeModalBg(e) { if (e.target.id === 'modalOverlay') closeModal(); }
function togglePack(item) {
  const checked = JSON.parse(localStorage.getItem('osaka_pack_v3') || '{}');
  if (checked[item]) delete checked[item]; else checked[item] = true;
  localStorage.setItem('osaka_pack_v3', JSON.stringify(checked));
  openModal('pack');
}

function initScrollAnim() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)'} });
  },{threshold:.1});
  document.querySelectorAll('.day').forEach(d => {
    d.style.opacity='0';d.style.transform='translateY(20px)';d.style.transition='all .8s ease';obs.observe(d);
  });
}

loadData(); render(); renderDday();
</script>
</body>
</html>
